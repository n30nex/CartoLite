<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#03070b" />
    <meta name="description" content="Live MeshCore Canada RF packet routes." />
    <title>CartoLite · MeshCore Canada</title>
  </head>
  <body>
    <main id="app" aria-label="CartoLite live map">
      <div id="map" aria-label="Live MeshCore route map"></div>
      <canvas id="packet-canvas" aria-hidden="true"></canvas>
      <section class="topbar glass" aria-label="Live status">
        <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>CartoLite</span></div>
        <div id="status" class="status" data-state="loading" role="status">
          <span class="status-dot" aria-hidden="true"></span><span id="status-text">Starting…</span>
        </div>
      </section>
      <section class="controls glass" aria-label="Map controls">
        <button id="follow-button" class="control-button" type="button" aria-pressed="false" title="Follow live packets">
          <span aria-hidden="true">◎</span><span>Live Follow</span>
        </button>
        <button id="routes-button" class="control-button selected" type="button" aria-label="Routes" aria-pressed="true" title="Hide routes">
          <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="6" cy="19" r="3"></circle>
            <path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"></path>
            <circle cx="18" cy="5" r="3"></circle>
          </svg>
          <span>Routes</span>
        </button>
        <button id="reset-button" class="control-button icon-button" type="button" title="Reset map view" aria-label="Reset map view">⌂</button>
      </section>
      <section class="legend glass" aria-label="Map legend">
        <span><i class="node repeater"></i>Repeater</span>
        <span><i class="node companion"></i>Companion</span>
        <span><i class="node room"></i>Room</span>
        <span><i class="route"></i>RF route</span>
      </section>
      <div id="tooltip" class="tooltip glass" role="tooltip" hidden></div>
      <div id="fatal" class="fatal glass" role="alert" hidden></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
